
<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <meta name="description" content="Visor de Realidad Aumentada educativo para niños." />
    <title>ChildAR — Visor AR</title>

    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />

    <link rel="stylesheet" href="css/styles.css" />
  </head>

  <body>

    <!-- ===== ESCENA AR ===== -->
    <a-scene
      embedded
      vr-mode-ui="enabled:false"
      renderer="alpha:true; antialias:true;"
      arjs="sourceType:webcam;"
    >
      <a-assets>
        <video
          id="goku"
          preload="auto"
          autoplay
          loop
          muted
          playsinline
          webkit-playsinline
          crossorigin="anonymous"
        ></video>
      </a-assets>

      <a-marker preset="hiro">
        <a-plane
          src="#goku"
          width="2"
          height="2"
          rotation="-90 0 0"
          position="0 0 0"
          material="transparent:true;"
        >
        </a-plane>
      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>
    <!-- ===== BOTÓN VOLVER ===== -->
    <a href="index.html" id="btn-back" aria-label="Volver al menú">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </a>


    <!-- ===== ETIQUETA DEL TEMA ===== -->
    <div id="theme-badge">
      <span id="theme-badge-icon"></span>
      <span id="theme-badge-title"></span>
    </div>

    <!-- ===== BOTÓN QUIZ ===== -->
    <button id="btn-quiz" onclick="abrirPanel()" aria-label="Abrir Quiz">
      <span class="btn-icon">🌱</span>
      <span class="btn-label">QUIZ</span>
    </button>

    <!-- ===== PANEL QUIZ ===== -->
    <div id="quiz-panel" role="dialog" aria-modal="true" aria-labelledby="question-title">
      <div class="quiz-handle"></div>

      <!-- Header del panel -->
      <div class="quiz-header">
        <div id="quiz-timer">⏱️ <span id="timer-text">15</span>s</div>
        <div id="quiz-progress-bar-wrap">
          <div id="quiz-progress-bar"></div>
        </div>
        <div class="stars-row">
          <span>⭐</span>
          <span id="panel-icon">🌱</span>
          <span>⭐</span>
        </div>
      </div>

      <h2 id="question-title"></h2>
      <p id="question-subtitle" class="subtitle"></p>

      <div id="quiz-options" class="quiz-options"></div>

      <button class="btn-close" onclick="cerrarPanel()">Cerrar ✕</button>
    </div>

    <!-- ===== ANIMACIÓN ESTRELLA (correcto / incorrecto) ===== -->
    <div id="star-anim-overlay" aria-hidden="true">
      <video id="star-anim-video" muted playsinline webkit-playsinline preload="auto"></video>
    </div>

    <!-- ===== OVERLAY FONDO ===== -->
    <div id="quiz-overlay" onclick="cerrarPanel()"></div>

    <script src="js/chromakey.js"></script>
    <script src="js/data.js"></script>
    <script src="js/video.js"></script>
    <script src="js/quiz.js"></script>
  </body>
</html>
